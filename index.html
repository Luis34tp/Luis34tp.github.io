<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos Populares 2026</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ffffff, #f2f2f2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 900px;
            padding: 30px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .boton {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .boton:hover {
            background-color: #0056b3;
        }

        /* Celular */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            p {
                font-size: 1.2rem;
            }

            .boton {
                font-size: 1.1rem;
                padding: 14px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Productos Populares 2026</h1>
        <p>
            Análisis de productos populares con enlaces directos 
            de compra en Amazon, Mercado Libre y AliExpress.
        </p>

        <a href="#" class="boton">Ver Productos 🔥</a>
    </div>

</body>
</html>
